name: Daily RSS Digest

on:
  schedule:
    - cron: '0 12 * * *'  # UTC 12:00 = 北京时间 20:00
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir feedparser google-genai

      - name: Validate code
        run: |
          python -c "import py_compile; [py_compile.compile(f, doraise=True) for f in ['fetch_feeds.py','issue_body.py']]"
          echo "✅ All validations passed"

      - name: Fetch and translate feeds
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
        run: python fetch_feeds.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest-*.md articles-*.json
          git diff --staged --quiet || git commit -m "Daily digest $(date +%Y-%m-%d)"
          git push

      - name: Create review Issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "review-needed" --description "Articles ready for review" --color "FFA500" || true
          DATE=$(date +%Y-%m-%d)
          python3 issue_body.py > /tmp/issue_body.md
          gh issue create \
            --title "📰 每日文章摘要 - ${DATE}" \
            --body-file /tmp/issue_body.md \
            --label "review-needed"
